<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body{
    margin:0;
    background:#fff;
    height:100vh;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  #wrap{ text-align:center; }

  #battery{ margin-bottom:18px; }

  #card{
    width:360px;
    max-width:calc(100vw - 40px);
    border:1px solid #000;
    padding:14px;
    text-align:left;
    background:#fff;
  }
  #row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  #box{
    width:18px;
    height:18px;
    border:1px solid #000;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    user-select:none;
  }
  #label{ flex:1; }
  #status{ margin-top:10px; font-size:12px; }

  #task{
    margin-top:14px;
    display:none;
  }
  #task-title{
    font-size:12px;
    margin-bottom:10px;
  }

  /* Task 1: slider */
  #slider{
    width:100%;
  }

  /* Task 2: drag */
  #drag-area{
    position:relative;
    height:90px;
    border:1px solid #000;
    overflow:hidden;
  }
  .chip{
    position:absolute;
    top:28px;
    width:110px;
    height:34px;
    border:1px solid #000;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
    background:#eee;
    cursor:grab;
  }
  #chip{ left:10px; }
  #target{
    right:10px;
    background:#fff;
  }

  /* Task 3: hold */
  #hold{
    width:100%;
    height:40px;
    border:1px solid #000;
    background:#eee;
    cursor:pointer;
  }

  /* Completion */
  #done{
    display:none;
    margin-top:18px;
  }
  #coming{ margin-bottom:10px; }
  #refresh{
    color:blue;
    cursor:pointer;
    user-select:none;
    font-size:18px;
  }

  /* Bottom URL */
  #url{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
  }
</style>

</head>
<body>

<div id="wrap">
  <div id="battery">BATTERY</div>

  <div id="card">
    <div id="row">
      <div id="box" aria-hidden="true"></div>
      <div id="label">I am not a robot</div>
      <div id="count" style="font-size:12px;">0/3</div>
    </div>
    <div id="status"></div>

    <div id="task">
      <div id="task-title"></div>

      <input id="slider" type="range" min="0" max="100" value="0" style="display:none;">

      <div id="drag-area" style="display:none;">
        <div id="chip" class="chip">HUMAN</div>
        <div id="target" class="chip"></div>
      </div>

      <button id="hold" style="display:none;">HOLD</button>
    </div>
  </div>

  <div id="done">
    <div id="coming">COMING SOON</div>
    <div id="refresh" title="Restart">↻</div>
  </div>
</div>

<div id="url">www.battery-us.com</div>

<script>
/*
  Silent, original mini-captcha:
  - 3 tasks total
  - ↻ restarts WITHOUT page reload
  - Each restart generates new options + shuffled order
*/

let completed = 0;
let running = false;

const box = document.getElementById("box");
const countEl = document.getElementById("count");
const statusEl = document.getElementById("status");
const taskEl = document.getElementById("task");
const titleEl = document.getElementById("task-title");

const slider = document.getElementById("slider");
const dragArea = document.getElementById("drag-area");
const chip = document.getElementById("chip");
const target = document.getElementById("target");
const holdBtn = document.getElementById("hold");

const cardEl = document.getElementById("card");
const doneEl = document.getElementById("done");
const refreshEl = document.getElementById("refresh");

const words = ["HUMAN","PERSON","VISITOR","USER","WITNESS","GUEST","OPERATOR","SUBJECT","ENTITY","SIGNAL"];

let taskOrder = ["slider","drag","hold"];
let sliderTarget = 100;
let holdSeconds = 2;
let dragWord = "HUMAN";
let dragTarget = "DROP";

function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function pick(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function setCount() {
  countEl.textContent = `${completed}/3`;
}

function resetTasksUI(){
  slider.style.display = "none";
  dragArea.style.display = "none";
  holdBtn.style.display = "none";
  statusEl.textContent = "";
  taskEl.style.display = "none";

  // remove previous handlers
  slider.oninput = null;
  chip.onpointerdown = null;
  window.onpointermove = null;
  window.onpointerup = null;
  holdBtn.onpointerdown = null;
  holdBtn.onpointerup = null;
  holdBtn.onpointercancel = null;
  holdBtn.onpointerleave = null;
}

function generateNewOptions(){
  taskOrder = shuffle(["slider","drag","hold"]);

  sliderTarget = randInt(70, 100);        // different each run
  holdSeconds  = randInt(1, 3);           // 1–3 seconds
  dragWord     = pick(words);
  dragTarget   = pick(["DROP","OK","HERE","YES","PASS","GO"]);
}

function startOver(){
  completed = 0;
  running = false;
  box.textContent = "";
  setCount();

  resetTasksUI();

  cardEl.style.display = "block";
  doneEl.style.display = "none";

  generateNewOptions();
}

function finish(){
  cardEl.style.display = "none";
  doneEl.style.display = "block";
}

function completeOne(){
  completed += 1;
  setCount();
  statusEl.textContent = "verified.";
  taskEl.style.display = "none";
  running = false;

  if (completed >= 3) {
    box.textContent = "✓";
    finish();
  } else {
    setTimeout(() => {
      statusEl.textContent = "";
      nextStep();
    }, 350);
  }
}

function nextStep(){
  resetTasksUI();
  taskEl.style.display = "block";
  running = true;

  const task = taskOrder[completed];

  if(task === "slider"){
    titleEl.textContent = `Slide to ${sliderTarget}%`;
    slider.value = 0;
    slider.style.display = "block";
    slider.oninput = () => {
      if(Number(slider.value) >= sliderTarget) completeOne();
    };
    return;
  }

  if(task === "drag"){
    titleEl.textContent = `Drag ${dragWord} into the box`;
    chip.textContent = dragWord;
    target.textContent = dragTarget;
    dragArea.style.display = "block";
    initDrag();
    return;
  }

  if(task === "hold"){
    titleEl.textContent = `Hold for ${holdSeconds} second${holdSeconds === 1 ? "" : "s"}`;
    holdBtn.textContent = "HOLD";
    holdBtn.style.display = "block";
    initHold();
    return;
  }
}

// Click checkbox row to begin/continue
document.getElementById("row").addEventListener("click", () => {
  if (running) return;
  if (completed >= 3) return;
  statusEl.textContent = "checking…";
  setTimeout(() => {
    statusEl.textContent = "";
    nextStep();
  }, 250);
});

// ↻ restarts with new options
refreshEl.addEventListener("click", () => {
  startOver();
});

// --- Drag task (mouse + touch) ---
let dragging = false;
let offsetX = 0, offsetY = 0;

function initDrag(){
  // reset chip position
  chip.style.left = "10px";
  chip.style.top = "28px";
  chip.style.cursor = "grab";

  const point = (e) => ({ x: e.clientX, y: e.clientY });

  const onDown = (e) => {
    dragging = true;
    chip.style.cursor = "grabbing";
    const r = chip.getBoundingClientRect();
    const p = point(e);
    offsetX = p.x - r.left;
    offsetY = p.y - r.top;
    e.preventDefault();
  };

  const onMove = (e) => {
    if(!dragging) return;
    const a = dragArea.getBoundingClientRect();
    const p = point(e);

    let x = p.x - a.left - offsetX;
    let y = p.y - a.top - offsetY;

    x = Math.max(0, Math.min(x, a.width - chip.offsetWidth));
    y = Math.max(0, Math.min(y, a.height - chip.offsetHeight));

    chip.style.left = x + "px";
    chip.style.top = y + "px";
    e.preventDefault();
  };

  const onUp = () => {
    if(!dragging) return;
    dragging = false;
    chip.style.cursor = "grab";

    const cr = chip.getBoundingClientRect();
    const tr = target.getBoundingClientRect();
    const overlap = !(cr.right < tr.left || cr.left > tr.right || cr.bottom < tr.top || cr.top > tr.bottom);

    if(overlap) completeOne();
  };

  chip.onpointerdown = onDown;
  window.onpointermove = onMove;
  window.onpointerup = onUp;
}

// --- Hold task ---
function initHold(){
  let timer = null;
  let start = 0;

  const down = () => {
    holdBtn.textContent = "HOLDING…";
    start = Date.now();
    timer = setInterval(() => {
      const ms = Date.now() - start;
      if(ms >= holdSeconds * 1000){
        clearInterval(timer);
        timer = null;
        holdBtn.textContent = "HOLD";
        completeOne();
      }
    }, 50);
  };

  const up = () => {
    if(timer) clearInterval(timer);
    timer = null;
    holdBtn.textContent = "HOLD";
  };

  holdBtn.onpointerdown = (e) => { e.preventDefault(); down(); };
  holdBtn.onpointerup = (e) => { e.preventDefault(); up(); };
  holdBtn.onpointercancel = up;
  holdBtn.onpointerleave = up;
}

// init
startOver();
</script>

</body>
</html>
