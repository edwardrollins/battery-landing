<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:white;
  height:100vh;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

#wrap{
  text-align:center;
}

#soon{
  display:none;
  margin-top:20px;
}

#refresh{
  display:none;
  margin-top:10px;
  color:blue;
  cursor:pointer;
  user-select:none;
}

iframe{
  margin-top:20px;
  border:none;
}
</style>

</head>

<body>

<div id="wrap">

<div>BATTERY</div>

<iframe
  id="captcha"
  src="https://embed.neal.fun/not-a-robot/1"
  width="400"
  height="540"
  scrolling="no"
  allow="autoplay 'none'; microphone 'none'; camera 'none';">
</iframe>

<div id="soon">COMING SOON</div>
<div id="refresh" onclick="location.reload()">↻</div>

</div>

<script>
let completed = 0;

const embeds = [
  "https://embed.neal.fun/not-a-robot/1",
  "https://embed.neal.fun/not-a-robot/2",
  "https://embed.neal.fun/not-a-robot/3"
];

function setCaptcha(i){
  document.getElementById("captcha").src = embeds[Math.min(i, embeds.length - 1)];
}

function finishAll(){
  document.getElementById("captcha").style.display = "none";
  document.getElementById("soon").style.display = "block";
  document.getElementById("refresh").style.display = "block";
}

window.addEventListener("message", (event) => {

  const d = event.data;

  const completedEvent =
    (typeof d === "string" && /complete|success/i.test(d)) ||
    (d && typeof d === "object" && (d.completed || d.success));

  if(!completedEvent) return;

  completed++;

  if(completed >= 3){
    finishAll();
  }else{
    setCaptcha(completed);
  }

});
</script>

</body>
</html>
